<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#17120f" />
    <meta
      name="description"
      content="Track apartments during a rental search — statuses, timelines, and follow-up actions, all stored on-device."
    />
    <title>Umzug</title>
    <script>
      // Decode the deep-link path that public/404.html stashed in the query
      // string, restoring the real URL before the router mounts.
      (function (l) {
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(null, "", l.pathname.slice(0, -1) + decoded + l.hash);
        }
      })(window.location);

      // Apply the saved theme before first paint to avoid a flash of the
      // wrong theme; SettingsProvider re-applies (and keeps watching) this
      // once React mounts.
      (function () {
        try {
          var raw = localStorage.getItem("umzug:settings");
          var mode = raw ? JSON.parse(raw).theme : "system";
          var resolved =
            mode === "light" || mode === "dark"
              ? mode
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = resolved;
        } catch {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
